<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#10b981" />
  <meta name="description" content="RushBasket - Premium e-commerce experience with quality products, fast delivery, and exceptional service." />
  <meta name="keywords" content="ecommerce, shopping, premium products, online store, rushbasket" />
  <meta name="author" content="RushBasket" />
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />
  
  <!-- Apple Touch Icon -->
  <link rel="apple-touch-icon" href="/logo.png" />
  
  <!-- Resource Hints: Reduced preconnect to critical backend ONLY -->
  <link rel="preconnect" href="https://backend1-eight-lovat.vercel.app" crossorigin />
  <link rel="dns-prefetch" href="https://backend1-eight-lovat.vercel.app" />
  <link rel="dns-prefetch" href="https://js.stripe.com" />
  <link rel="dns-prefetch" href="https://api.stripe.com" />
  
  <!-- Self-hosting Fonts Strategy (Replace with local @font-face in CSS for best LCP) -->
  <link rel="preload" href="/fonts/inter-v12-latin-regular.woff2" as="font" type="font/woff2" crossorigin />
  <style>
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('/fonts/inter-v12-latin-regular.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Playfair Display';
      font-style: normal;
      font-weight: 700;
      font-display: swap;
      src: url('/fonts/playfair-display-v37-latin-700.woff2') format('woff2');
    }
    body { font-family: 'Inter', sans-serif; }
    h1, h2, h3 { font-family: 'Playfair Display', serif; }
  </style>

  <!-- CRITICAL: Preload LCP hero image with high priority -->
  <link rel="preload" as="image" href="/FoodBanner.png" fetchpriority="high" />
  
  <!-- Resource Management -->
  <meta name="referrer" content="no-referrer-when-downgrade" />
  
  <!-- Open Graph -->
  <meta property="og:title" content="RushBasket - Premium E-commerce" />
  <meta property="og:description" content="Premium shopping experience with quality products and fast delivery." />
  <meta property="og:image" content="/logo.png" />
  <meta property="og:url" content="https://frontend-rush-basket.vercel.app" />
  <meta property="og:type" content="website" />
  
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="RushBasket - Premium E-commerce" />
  <meta name="twitter:description" content="Premium shopping experience with quality products." />
  <meta name="twitter:image" content="/logo.png" />
  
  <!-- Security Headers -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
  
  <title>RushBasket - Premium E-commerce</title>
  
  <!-- Optimized Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      const registerSW = () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('[SW] Registered'))
          .catch(err => console.error('[SW] Error:', err));
      };

      if (window.requestIdleCallback) {
        window.requestIdleCallback(() => {
          setTimeout(registerSW, 2000); // Wait for initial render
        });
      } else {
        window.addEventListener('load', () => setTimeout(registerSW, 2000));
      }
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
