<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Basket</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f172a;
        color: #e5e7eb;
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
      }
      .card {
        max-width: 420px;
        padding: 2rem;
        border-radius: 1.5rem;
        background: rgba(15, 23, 42, 0.9);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        text-align: center;
      }
      h1 {
        font-size: 1.75rem;
        margin-bottom: 0.75rem;
      }
      p {
        margin: 0.25rem 0;
        color: #9ca3af;
      }
      .btn {
        margin-top: 1.5rem;
        padding: 0.75rem 1.5rem;
        border-radius: 9999px;
        border: none;
        background: #22c55e;
        color: #022c22;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You are offline</h1>
      <p>It looks like your internet connection is down.</p>
      <p>You can still browse content that was cached earlier.</p>
      <button class="btn" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
  </html>
